<H1><CENTER>LOS GATOS</CENTER></H1>
Los gatos domésticos (Felis catus) son pequeños mamíferos carnívoros, famosos por su agilidad, instinto cazador e independencia. Han convivido con los humanos desde hace más de 9000 años y se han convertido en una de las mascotas más populares del mundo.
